<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>My Journal</title>
</head>
<body>

    <div class="shelf">
        <div class="content-wrapper text-box">
            <h1>// MY_JOURNAL</h1>
            <p>things i think and tiny pieces of my reality</p>
        </div>
    </div>

    <div id="journal-posts">
        
        <div class="shelf">
            <div class="content-wrapper text-box" style="text-align: left;">
                <h3 style="color: #ff4081;">Enter the diary</h3>
                <small class="date-stamp"></small>
                <p>sometimes i feel so unreal, like everything around me is fake, and i don't like that, is like my body was only made for being tortured, i hate how i can socialize with anybody, and how they think im a weirdo</p>
            </div>
        </div>
        </div>

    <div class="shelf">
        <nav class="footer-nav">
            <a href="index.html">← surface</a>
        </nav>
    </div>

    <script>
        // Esto pone la fecha y hora actual automáticamente
        const dateElements = document.querySelectorAll('.date-stamp');
        dateElements.forEach(el => {
            const now = new Date();
            el.innerText = now.toLocaleString('es-ES', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', 
                hour: '2-digit', minute: '2-digit' 
            });
        });
    </script>
</body>
</html>
