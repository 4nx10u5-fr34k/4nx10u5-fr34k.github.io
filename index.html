        body {
            /* Fondo morute/lace consistente */
            background-image: url('Lace Pink Wallpaper.jpg'); 
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-color: #ffeef8;
            color: #d35884;
            font-family: 'Verdana', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Navegación consistente */
        nav {
            width: 100%;
            background-color: rgba(255, 179, 217, 0.85);
            padding: 25px 0;
            text-align: center;
            border-bottom: 5px pink double;
            backdrop-filter: blur(5px);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 25px;
            font-size: 1.6em;
            font-weight: bold;
            text-shadow: 2px 2px #ff99cc;
            transition: 0.3s;
        }

        nav a:hover {
            color: #8b0000;
            transform: scale(1.1);
        }

        .main-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 40px 0;
        }

        .content-card {
            background-color: rgba(255, 255, 255, 0.85);
            width: 90%;
            max-width: 1100px; /* Un poco más ancho para la galería */
            border: 8px double #ffb3d9;
            border-radius: 50px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 179, 217, 0.6);
            backdrop-filter: blur(4px);
        }

        h1 {
            font-size: 3.2em;
            margin-bottom: 10px;
            color: #ff99cc;
            text-shadow: 2px 2px white;
        }

        .gallery-subtitle {
            font-size: 1.2em;
            margin-bottom: 40px;
            font-style: italic;
        }

        /* Cuadrícula de Arte Morute */
        .art-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .art-item {
            background: white;
            padding: 15px;
            border: 3px dashed #ffb3d9;
            border-radius: 25px;
            transition: 0.3s;
        }

        .art-item:hover {
            transform: translateY(-10px) rotate(2deg);
            box-shadow: 0 10px 20px rgba(255, 179, 217, 0.4);
        }

        .art-item img {
            width: 100%;
            border-radius: 15px;
            border: 2px solid #fff0f6;
            cursor: zoom-in;
        }

        .art-title {
            margin-top: 15px;
            font-weight: bold;
            font-size: 1.1em;
            color: #ff99cc;
            text-transform: lowercase; /* Estética morute */
        }

        footer {
            padding: 25px;
            font-size: 1.1em;
            color: #ffb3d9;
            font-weight: bold;
        }
    </style>
</head>
