<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kawaii Home</title>
<style>
body{
    background:#f8dfe8;
    background-image: radial-gradient(#fff3 1px, transparent 1px);
    background-size:20px 20px;
    font-family: Georgia, serif;
}

.container{
    width:420px;
    margin:auto;
    background:#fff6fa;
    border:4px solid #f2d4de;
    padding:20px;
    box-shadow:0 0 20px #eab8ca;
}

h1{
    text-align:center;
    color:#b87d94;
    font-size:28px;
    font-style:italic;
}

.box{
    background:white;
    border:2px solid #f1d3df;
    padding:10px;
    margin:15px 0;
}

img{
    width:100%;
    border:3px solid white;
}

.menu{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
}

button{
    background:#f5d6e0;
    border:none;
    padding:10px;
    color:#8a5d6f;
    font-weight:bold;
    cursor:pointer;
}
button:hover{
    background:#efbfd0;
}
</style>
</head>
<body>

<div class="shelf-container">
    <img src="profile_doll.png" class="character-img" alt="My Profile">
    
    <div class="text-area">
        <h1>Hi! I'm Lars or Kitty</h1>
        <p>I don't really have a name yet...</p>
    </div>
</div>

<div class="shelf-container">
    <img src="profile_goth.png" class="character-img" alt="Goth Art">
    </div>

<div class="menu">
<button>gallery</button>
<button>blog</button>
<button>works</button>
<button>about</button>
<button>links</button>
<button>more</button>
</div>

</div>
</body>
</html>
