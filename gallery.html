        /* Estilos específicos para la cuadrícula de arte */
        .art-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

            margin-top: 30px;
            width: 100%;
        }

        .art-item {
            border: 2px dashed #ff99cc;
            padding: 15px;
            background: #fff;
            border-radius: 8px;
            text-align: center;
            transition: 0.3s;
        }

        .art-item:hover {
            box-shadow: 0 0 15px #ffb3d9;
            transform: scale(1.02);
        }

        .art-item img {
            width: 100%;
            border: 1px solid #ffcce6;
            margin-bottom: 10px;
        }

        .art-title {
            font-size: 1.1em;
            color: #d35884;
            font-weight: bold;
            margin: 0;
            text-transform: uppercase;
        }
    </style>
</head>
