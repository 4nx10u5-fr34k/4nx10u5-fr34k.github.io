    <style>
        body {
            background-image: url('Lace Pink Wallpaper.jpg'); 
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-color: #ffeef8;
            color: #d35884;
            font-family: 'Verdana', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* NAVEGACIÓN */
        nav {
            width: 100%;
            background-color: rgba(255, 179, 217, 0.85);
            padding: 25px 0;
            text-align: center;
            border-bottom: 5px pink double;
            backdrop-filter: blur(5px);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 25px;
            font-size: 1.6em;
            font-weight: bold;
            text-shadow: 2px 2px #ff99cc;
            transition: 0.3s;
        }

        /* FILTROS */
        .filter-container {
            margin: 30px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .filter-btn {
            background: white;
            border: 3px solid #ffb3d9;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            color: #ff99cc;
            font-weight: bold;
            font-size: 1.1em;
            transition: 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #ffb3d9;
            color: white;
        }

        /* CONTENEDOR DE ARTE */
        .content-card {
            background-color: rgba(255, 255, 255, 0.85);
            width: 90%;
            max-width: 1200px;
            border: 8px double #ffb3d9;
            border-radius: 50px;
            padding: 50px;
            box-shadow: 0 0 40px rgba(255, 179, 217, 0.6);
            backdrop-filter: blur(4px);
            margin-bottom: 40px;
        }

        .art-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .art-item {
            background: white;
            padding: 15px;
            border: 3px dashed #ffb3d9;
            border-radius: 25px;
            display: block; /* Para que filterSelection funcione */
        }

        .art-item img {
            width: 100%;
            border-radius: 15px;
            transition: 0.3s;
        }

        .art-item img:hover {
            filter: brightness(1.1) contrast(1.1);
            animation: blink 0.2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; }
        }

        .art-title {
            margin-top: 15px;
            font-weight: bold;
            color: #ff99cc;
            text-align: center;
        }

        footer { padding: 25px; color: #ffb3d9; font-weight: bold; }
    </style>
</head>

<script>
function filterSelection(c, btn) {
    var x, i;
    x = document.getElementsByClassName("art-item");
    if (c == "all") c = "";
    for (i = 0; i < x.length; i++) {
        x[i].style.display = "none";
        if (x[i].className.indexOf(c) > -1) {
            x[i].style.display = "block";
        }
    }
    
    // Cambiar estado activo de botones
    var btns = document.getElementsByClassName("filter-btn");
    for (i = 0; i < btns.length; i++) {
        btns[i].classList.remove("active");
    }
    btn.classList.add("active");
}
</script>
